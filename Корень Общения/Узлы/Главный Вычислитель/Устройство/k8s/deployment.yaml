apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-inference
  labels:
    app: rust-inference
    chain: user-message-processing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rust-inference
  template:
    metadata:
      labels:
        app: rust-inference
    spec:
      containers:
        - name: rust-inference
          image: yourregistry/rust-inference:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: RUST_LOG
              value: info
            - name: PORT
              value: "8081"
            - name: MODEL_NAME
              value: phi3:mini
            - name: BOOTSTRAP_MOCK_MODE
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
